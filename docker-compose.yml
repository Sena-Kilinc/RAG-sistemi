# docker-compose.yml
version: '3.9'

services:

  # 1. FastAPI — Ana API'mız
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data          # PDF'lerin okunacağı klasör
    environment:
      - CHROMA_HOST=chroma    # Servis adı = hostname (Docker magic!)
      - OLLAMA_HOST=ollama
    depends_on:
      - chroma
      - ollama

  # 2. ChromaDB — Vector Database
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma  # Veriler kaybolmasın

  # 3. Ollama — Local LLM (GPU opsiyonel)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama  # Model dosyaları

  # 4. Airflow — Pipeline Scheduler
  airflow:
    image: apache/airflow:2.8.0
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    ports:
      - "8080:8080"           # Airflow UI
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/data
    command: standalone       # Dev için basit mod

volumes:
  chroma_data:
  ollama_models: